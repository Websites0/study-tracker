<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Physics 1st & 2nd Paper Progress Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        bengali: ['"Noto Sans Bengali"', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            50: '#eff6ff',
                            100: '#dbeafe',
                            500: '#3b82f6',
                            600: '#2563eb',
                            900: '#1e3a8a',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Noto Sans Bengali', sans-serif; }
        .tab-active { border-bottom: 2px solid #2563eb; color: #2563eb; font-weight: 600; }
        .progress-circle { transition: stroke-dashoffset 0.5s ease-in-out; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen flex flex-col">

    <header class="bg-white shadow-sm sticky top-0 z-10">
        <div class="max-w-4xl mx-auto px-4 py-4 sm:py-6">
            
            <a href="https://t.me/solve_with_polls" target="_blank" rel="noopener noreferrer" class="mb-6 flex items-center justify-center gap-2 bg-[#2ba3e3] hover:bg-[#228dc6] text-white px-4 py-2.5 rounded-xl transition shadow-sm hover:shadow-md">
                <svg class="w-5 h-5 fill-current" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M11.944 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0a12 12 0 0 0-.056 0zm4.962 7.224c.1-.002.321.023.465.14a.506.506 0 0 1 .171.325c.016.093.036.306.02.472-.18 1.898-.962 6.502-1.36 8.627-.168.9-.499 1.201-.82 1.23-.696.065-1.225-.46-1.9-.902-1.056-.693-1.653-1.124-2.678-1.8-1.185-.78-.417-1.21.258-1.91.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.14-5.061 3.345-.48.33-.913.49-1.302.48-.428-.008-1.252-.241-1.865-.44-.752-.245-1.349-.374-1.297-.789.027-.216.325-.437.893-.664 3.498-1.524 5.83-2.529 6.998-3.014 3.332-1.386 4.025-1.627 4.476-1.635z"/></svg>
                <span class="font-medium text-sm sm:text-base">Join our Telegram Channel: Solve with Polls</span>
            </a>

            <div class="flex flex-col sm:flex-row justify-between items-center gap-4">
                <div>
                    <h1 class="text-2xl font-bold text-gray-900">পদার্থবিজ্ঞান প্রস্তুতি ট্র্যাকার</h1>
                    <p class="text-sm text-gray-500 mt-1">HSC Physics 1st & 2nd Paper</p>
                </div>
                
                <div class="flex items-center gap-4 bg-brand-50 p-3 rounded-xl border border-brand-100">
                    <div class="relative w-16 h-16">
                        <svg class="w-16 h-16 transform -rotate-90">
                            <circle cx="32" cy="32" r="28" stroke="#dbeafe" stroke-width="6" fill="transparent" />
                            <circle id="overallProgressCircle" class="progress-circle" cx="32" cy="32" r="28" stroke="#3b82f6" stroke-width="6" fill="transparent" stroke-dasharray="175.93" stroke-dashoffset="175.93" stroke-linecap="round" />
                        </svg>
                        <div class="absolute inset-0 flex items-center justify-center">
                            <span id="overallProgressText" class="text-sm font-bold text-brand-600">0%</span>
                        </div>
                    </div>
                    <div>
                        <p class="text-xs text-gray-500 font-semibold uppercase tracking-wider">মোট অগ্রগতি</p>
                        <p id="overallTopicsText" class="text-sm font-medium text-gray-800">0 / 100 টপিক</p>
                    </div>
                </div>
            </div>

            <div class="flex gap-6 mt-6 border-b border-gray-200">
                <button onclick="switchTab('dashboard')" id="tab-dashboard" class="pb-2 px-1 text-gray-500 hover:text-brand-600 transition tab-active">ড্যাশবোর্ড</button>
                <button onclick="switchTab('syllabus')" id="tab-syllabus" class="pb-2 px-1 text-gray-500 hover:text-brand-600 transition">সিলেবাস</button>
            </div>
        </div>
    </header>

    <main class="flex-grow max-w-4xl mx-auto w-full px-4 py-6">
        
        <div id="view-dashboard" class="space-y-6">
        </div>

        <div id="view-syllabus" class="hidden space-y-6">
        </div>

    </main>

    <footer class="bg-white border-t border-gray-200 mt-auto">
        <div class="max-w-4xl mx-auto px-4 py-6 flex flex-col sm:flex-row justify-between items-center gap-4 text-center sm:text-left">
            <div>
                <p class="text-base font-bold text-gray-800">Made by <span class="text-brand-600">Solver Family</span></p>
            </div>
            
            <div class="flex items-center gap-2 justify-center sm:justify-end">
                <span class="text-sm text-gray-600 font-medium">মোট ভিজিটর:</span>
                <img src="https://api.visitorbadge.io/api/visitors?path=physics-tracker-hsc-demo&countColor=%232563eb&style=flat" alt="Visitor Count" class="h-6 rounded">
            </div>
        </div>
    </footer>

    <script>
        const syllabusData = {
            "পদার্থবিজ্ঞান ১ম পত্র": {
                "অধ্যায়-০১: ভৌত জগৎ ও পরিমাপ": [
                    "T-01 | একক ও মাত্রা", "T-02 | পরিমাপের ত্রুটি", "T-03 | ভার্নিয়ার স্কেল, স্ক্রু-গজ ও স্ফেরোমিটার", "T-04 | বিবিধ"
                ],
                "অধ্যায়-০২: ভেক্টর": [
                    "T-01 | ভেক্টর ও লব্ধি", "T-02 | ভেক্টরের উপাংশ", "T-03 | আপেক্ষিক বেগ", "T-04 | অবস্থান ভেক্টর এবং একক ভেক্টর",
                    "T-05 | নদী ও নৌকা", "T-06 | ভেক্টরের ডট গুণন", "T-07 | ভেক্টরের ক্রস গুণন", "T-08 | ভেক্টর ক্যালকুলাস"
                ],
                "অধ্যায়-০৪: নিউটনিয়ান বলবিদ্যা": ["T-01", "T-02", "T-03", "T-04", "T-05", "T-06", "T-07"],
                "অধ্যায়-০৫: কাজ, শক্তি ও ক্ষমতা": ["T-01", "T-02", "T-03", "T-04", "T-05"],
                "অধ্যায়-০৬: মহাকর্ষ ও অভিকর্ষ": ["T-01", "T-02", "T-03", "T-04", "T-05", "T-06", "T-07"],
                "অধ্যায়-০৭: পদার্থের গাঠনিক ধর্ম": ["T-01", "T-02", "T-03", "T-04", "T-05", "T-06", "T-07"],
                "অধ্যায়-০৮: পর্যাবৃত্ত গতি": ["T-01", "T-02", "T-03", "T-04", "T-05", "T-06", "T-07"],
                "অধ্যায়-১০: আদর্শ গ্যাস ও গ্যাসের গতিতত্ত্ব": ["T-01", "T-02", "T-03", "T-04", "T-05", "T-06", "T-07"]
            },
            "পদার্থবিজ্ঞান ২য় পত্র": {
                "অধ্যায়-০১: তাপগতিবিদ্যা": ["T-01", "T-02", "T-03", "T-04", "T-05", "T-06", "T-07", "T-08", "T-09", "T-10"],
                "অধ্যায়-০২: স্থির তড়িৎ": ["T-01", "T-02", "T-03", "T-04", "T-05", "T-06", "T-07"],
                "অধ্যায়-০৩: চল তড়িৎ": ["T-01", "T-02", "T-03", "T-04", "T-05", "T-06", "T-07", "T-08"],
                "অধ্যায়-০৭: ভৌত আলোকবিজ্ঞান": ["T-01", "T-02", "T-03", "T-04"],
                "অধ্যায়-০৮: আধুনিক পদার্থবিজ্ঞানের সূচনা": [
                    "T-01", "T-02", "T-03", "T-04", "T-05",
                    "T-06 | আইনস্টাইনের ভর-শক্তি সম্পর্ক", "T-07 | আলোক তড়িৎ ক্রিয়া", "T-08 | এক্স-রে"
                ],
                "অধ্যায়-০৯: পরমাণুর মডেল এবং নিউক্লিয়ার পদার্থবিজ্ঞান": [
                    "T-01 | পরমাণুর ভৌত গঠন ও প্রয়োজনীয় রাশি",
                    "T-02 | পরমাণুর আকার ও শক্তিস্তরের শক্তি",
                    "T-03 | তেজস্ক্রিয় ভাঙন, বিভিন্ন রশ্মি এবং নিউক্লীয় বিক্রিয়া",
                    "T-04 | তেজস্ক্রিয়তা ও ক্ষয় সূত্র",
                    "T-05 | ভরত্রুটি ও বন্ধন শক্তি"
                ],
                "অধ্যায়-১০: সেমিকন্ডাক্টর ও ইলেকট্রনিক্স": [
                    "T-01 | পরিবাহী, অর্ধপরিবাহী এবং অপরিবাহী",
                    "T-02 | ডায়োড ও p-n জাংশন",
                    "T-03", "T-04", "T-05", "T-06"
                ]
            }
        };

        let progressState = JSON.parse(localStorage.getItem('physicsTrackerState')) || {};

        function saveState() {
            localStorage.setItem('physicsTrackerState', JSON.stringify(progressState));
            updateOverallProgress();
            renderDashboard();
        }

        function toggleTopic(paper, chapter, topic) {
            if (!progressState[paper]) progressState[paper] = {};
            if (!progressState[paper][chapter]) progressState[paper][chapter] = {};
            
            progressState[paper][chapter][topic] = !progressState[paper][chapter][topic];
            saveState();
        }

        function isTopicCompleted(paper, chapter, topic) {
            return progressState[paper]?.[chapter]?.[topic] === true;
        }

        function getChapterStats(paper, chapter) {
            const topics = syllabusData[paper][chapter];
            const total = topics.length;
            let completed = 0;
            topics.forEach(t => {
                if (isTopicCompleted(paper, chapter, t)) completed++;
            });
            return { total, completed, percentage: total === 0 ? 0 : Math.round((completed / total) * 100) };
        }

        function updateOverallProgress() {
            let totalTopics = 0;
            let completedTopics = 0;

            for (const paper in syllabusData) {
                for (const chapter in syllabusData[paper]) {
                    const stats = getChapterStats(paper, chapter);
                    totalTopics += stats.total;
                    completedTopics += stats.completed;
                }
            }

            const percentage = totalTopics === 0 ? 0 : Math.round((completedTopics / totalTopics) * 100);
            
            document.getElementById('overallProgressText').innerText = `${percentage}%`;
            document.getElementById('overallTopicsText').innerText = `${completedTopics} / ${totalTopics} টপিক`;

            const circumference = 175.93;
            const offset = circumference - (percentage / 100) * circumference;
            document.getElementById('overallProgressCircle').style.strokeDashoffset = offset;
        }

        function renderDashboard() {
            const dashboardContainer = document.getElementById('view-dashboard');
            dashboardContainer.innerHTML = '';

            for (const paper in syllabusData) {
                let paperHTML = `
                    <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                        <div class="bg-brand-50 px-5 py-4 border-b border-brand-100">
                            <h2 class="text-lg font-bold text-brand-900">${paper}</h2>
                        </div>
                        <div class="p-0 overflow-x-auto">
                            <table class="w-full text-left border-collapse">
                                <thead>
                                    <tr class="bg-gray-50 text-gray-500 text-sm">
                                        <th class="px-5 py-3 font-medium border-b border-gray-200">অধ্যায়</th>
                                        <th class="px-5 py-3 font-medium border-b border-gray-200 text-center">মোট টপিক</th>
                                        <th class="px-5 py-3 font-medium border-b border-gray-200 text-center">সম্পন্ন</th>
                                        <th class="px-5 py-3 font-medium border-b border-gray-200 w-1/3">অগ্রগতি</th>
                                    </tr>
                                </thead>
                                <tbody class="divide-y divide-gray-100">
                `;

                for (const chapter in syllabusData[paper]) {
                    const stats = getChapterStats(paper, chapter);
                    paperHTML += `
                        <tr class="hover:bg-gray-50 transition">
                            <td class="px-5 py-3 text-sm font-medium text-gray-800">${chapter}</td>
                            <td class="px-5 py-3 text-sm text-gray-600 text-center">${stats.total}</td>
                            <td class="px-5 py-3 text-sm text-gray-600 text-center">${stats.completed}</td>
                            <td class="px-5 py-3">
                                <div class="flex items-center gap-3">
                                    <div class="w-full bg-gray-200 rounded-full h-2.5">
                                        <div class="bg-brand-500 h-2.5 rounded-full transition-all duration-500" style="width: ${stats.percentage}%"></div>
                                    </div>
                                    <span class="text-xs font-semibold text-gray-600 min-w-[3ch]">${stats.percentage}%</span>
                                </div>
                            </td>
                        </tr>
                    `;
                }

                paperHTML += `</tbody></table></div></div>`;
                dashboardContainer.innerHTML += paperHTML;
            }
        }

        function renderSyllabus() {
            const syllabusContainer = document.getElementById('view-syllabus');
            syllabusContainer.innerHTML = '';

            for (const paper in syllabusData) {
                let paperHTML = `
                    <div class="mb-8">
                        <h2 class="text-xl font-bold text-gray-900 mb-4 px-2 border-l-4 border-brand-500">${paper}</h2>
                        <div class="space-y-3">
                `;

                for (const chapter in syllabusData[paper]) {
                    const topics = syllabusData[paper][chapter];
                    const stats = getChapterStats(paper, chapter);
                    const chapterId = `ch-${Math.random().toString(36).substr(2, 9)}`;

                    paperHTML += `
                        <div class="bg-white border border-gray-200 rounded-lg shadow-sm">
                            <button onclick="toggleAccordion('${chapterId}')" class="w-full px-5 py-4 flex justify-between items-center bg-gray-50 hover:bg-gray-100 transition rounded-t-lg focus:outline-none">
                                <div class="flex items-center gap-3">
                                    <span class="font-semibold text-gray-800 text-left">${chapter}</span>
                                    <span class="text-xs font-medium px-2 py-1 bg-brand-100 text-brand-700 rounded-full" id="badge-${chapterId}">${stats.completed}/${stats.total}</span>
                                </div>
                                <svg class="w-5 h-5 text-gray-500 transform transition-transform duration-200" id="icon-${chapterId}" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                            </button>
                            <div id="${chapterId}" class="hidden px-5 py-4 border-t border-gray-100">
                                <div class="space-y-2">
                    `;

                    topics.forEach((topic, index) => {
                        const isDone = isTopicCompleted(paper, chapter, topic);
                        const topicId = `${paper}-${chapter}-${index}`;
                        
                        paperHTML += `
                            <label class="flex items-start gap-3 p-2 hover:bg-gray-50 rounded cursor-pointer transition">
                                <div class="relative flex items-center h-5 mt-0.5">
                                    <input type="checkbox" 
                                        class="w-5 h-5 text-brand-600 border-gray-300 rounded focus:ring-brand-500 cursor-pointer" 
                                        ${isDone ? 'checked' : ''} 
                                        onchange="handleTopicChange('${paper}', '${chapter}', '${topic}', '${chapterId}')"
                                    >
                                </div>
                                <span class="text-sm text-gray-700 ${isDone ? 'line-through text-gray-400' : ''}" id="text-${topicId}">${topic}</span>
                            </label>
                        `;
                    });

                    paperHTML += `</div></div></div>`;
                }

                paperHTML += `</div></div>`;
                syllabusContainer.innerHTML += paperHTML;
            }
        }

        function handleTopicChange(paper, chapter, topic, accordionId) {
            toggleTopic(paper, chapter, topic);
            
            const stats = getChapterStats(paper, chapter);
            document.getElementById(`badge-${accordionId}`).innerText = `${stats.completed}/${stats.total}`;
            
            const checkbox = event.target;
            const span = checkbox.closest('label').querySelector('span');
            if (checkbox.checked) {
                span.classList.add('line-through', 'text-gray-400');
            } else {
                span.classList.remove('line-through', 'text-gray-400');
            }
        }

        function toggleAccordion(id) {
            const content = document.getElementById(id);
            const icon = document.getElementById(`icon-${id}`);
            
            if (content.classList.contains('hidden')) {
                content.classList.remove('hidden');
                icon.classList.add('rotate-180');
            } else {
                content.classList.add('hidden');
                icon.classList.remove('rotate-180');
            }
        }

        function switchTab(tab) {
            document.getElementById('view-dashboard').classList.add('hidden');
            document.getElementById('view-syllabus').classList.add('hidden');
            
            document.getElementById('tab-dashboard').classList.remove('tab-active');
            document.getElementById('tab-syllabus').classList.remove('tab-active');

            document.getElementById(`view-${tab}`).classList.remove('hidden');
            document.getElementById(`tab-${tab}`).classList.add('tab-active');
        }

        window.onload = () => {
            updateOverallProgress();
            renderDashboard();
            renderSyllabus();
        };

    </script>
</body>
</html>
