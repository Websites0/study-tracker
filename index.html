        let progressState = JSON.parse(localStorage.getItem('physicsTrackerState')) || {};

        function saveState() {
            localStorage.setItem('physicsTrackerState', JSON.stringify(progressState));
            updateOverallProgress();
            renderDashboard();
            
            const indicator = document.getElementById('save-indicator');
            if(indicator) {
                indicator.innerHTML = `<svg class="w-3 h-3 sm:w-4 sm:h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg> সেভ হয়েছে!`;
                indicator.classList.add('text-green-600');
                indicator.classList.remove('text-gray-500');
                setTimeout(() => {
                    indicator.innerHTML = `<svg class="w-3 h-3 sm:w-4 sm:h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg> অটো-সেভ অন আছে`;
                    indicator.classList.remove('text-green-600');
                    indicator.classList.add('text-gray-500');
                }, 1500);
            }
        }

        function toggleTopic(paper, chapter, topic) {
            if (!progressState[paper]) progressState[paper] = {};
            if (!progressState[paper][chapter]) progressState[paper][chapter] = {};
            
            progressState[paper][chapter][topic] = !progressState[paper][chapter][topic];
            saveState();
        }

        function isTopicCompleted(paper, chapter, topic) {
            return progressState[paper]?.[chapter]?.[topic] === true;
        }

        function getChapterStats(paper, chapter) {
            const topics = syllabusData[paper][chapter];
            const total = topics.length;
            let completed = 0;
            topics.forEach(t => {
                if (isTopicCompleted(paper, chapter, t)) completed++;
            });
            return { total, completed, percentage: total === 0 ? 0 : Math.round((completed / total) * 100) };
        }

        function updateOverallProgress() {
            let totalTopics = 0;
            let completedTopics = 0;

            for (const paper in syllabusData) {
                for (const chapter in syllabusData[paper]) {
                    const stats = getChapterStats(paper, chapter);
                    totalTopics += stats.total;
                    completedTopics += stats.completed;
                }
            }

            const percentage = totalTopics === 0 ? 0 : Math.round((completedTopics / totalTopics) * 100);
            
            document.getElementById('overallProgressText').innerText = `${percentage}%`;
            document.getElementById('overallTopicsText').innerText = `${completedTopics} / ${totalTopics} টপিক`;

            const circumference = 175.93;
            const offset = circumference - (percentage / 100) * circumference;
            document.getElementById('overallProgressCircle').style.strokeDashoffset = offset;
        }

        function renderDashboard() {
            const dashboardContainer = document.getElementById('view-dashboard');
            dashboardContainer.innerHTML = '';

            for (const paper in syllabusData) {
                let paperHTML = `
                    <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                        <div class="bg-brand-50 px-3 py-3 sm:px-5 sm:py-4 border-b border-brand-100">
                            <h2 class="text-base sm:text-lg font-bold text-brand-900">${paper}</h2>
                        </div>
                        <div class="p-0 overflow-x-auto w-full">
                            <table class="w-full text-left border-collapse min-w-[320px]">
                                <thead>
                                    <tr class="bg-gray-50 text-gray-500 text-[11px] sm:text-sm">
                                        <th class="px-3 py-2 sm:px-5 sm:py-3 font-medium border-b border-gray-200">অধ্যায়</th>
                                        <th class="px-2 py-2 sm:px-5 sm:py-3 font-medium border-b border-gray-200 text-center whitespace-nowrap">মোট টপিক</th>
                                        <th class="px-2 py-2 sm:px-5 sm:py-3 font-medium border-b border-gray-200 text-center whitespace-nowrap">সম্পন্ন</th>
                                        <th class="px-3 py-2 sm:px-5 sm:py-3 font-medium border-b border-gray-200 w-[35%] sm:w-1/3">অগ্রগতি</th>
                                    </tr>
                                </thead>
                                <tbody class="divide-y divide-gray-100">
                `;

                for (const chapter in syllabusData[paper]) {
                    const stats = getChapterStats(paper, chapter);
                    paperHTML += `
                        <tr class="hover:bg-gray-50 transition">
                            <td class="px-3 py-2 sm:px-5 sm:py-3 text-xs sm:text-sm font-medium text-gray-800 leading-snug">${chapter}</td>
                            <td class="px-2 py-2 sm:px-5 sm:py-3 text-xs sm:text-sm text-gray-600 text-center">${stats.total}</td>
                            <td class="px-2 py-2 sm:px-5 sm:py-3 text-xs sm:text-sm text-gray-600 text-center">${stats.completed}</td>
                            <td class="px-3 py-2 sm:px-5 sm:py-3">
                                <div class="flex items-center gap-1.5 sm:gap-3">
                                    <div class="w-full bg-gray-200 rounded-full h-1.5 sm:h-2.5">
                                        <div class="bg-brand-500 h-1.5 sm:h-2.5 rounded-full transition-all duration-500" style="width: ${stats.percentage}%"></div>
                                    </div>
                                    <span class="text-[10px] sm:text-xs font-semibold text-gray-600 min-w-[3ch] text-right">${stats.percentage}%</span>
                                </div>
                            </td>
                        </tr>
                    `;
                }

                paperHTML += `</tbody></table></div></div>`;
                dashboardContainer.innerHTML += paperHTML;
            }
        }

        function renderSyllabus() {
            const syllabusContainer = document.getElementById('view-syllabus');
            syllabusContainer.innerHTML = '';

            for (const paper in syllabusData) {
                let paperHTML = `
                    <div class="mb-6 sm:mb-8">
                        <h2 class="text-lg sm:text-xl font-bold text-gray-900 mb-3 sm:mb-4 px-2 border-l-4 border-brand-500">${paper}</h2>
                        <div class="space-y-2.5 sm:space-y-3">
                `;

                for (const chapter in syllabusData[paper]) {
                    const topics = syllabusData[paper][chapter];
                    const stats = getChapterStats(paper, chapter);
                    const chapterId = `ch-${Math.random().toString(36).substr(2, 9)}`;

                    paperHTML += `
                        <div class="bg-white border border-gray-200 rounded-lg shadow-sm">
                            <button onclick="toggleAccordion('${chapterId}')" class="w-full px-3 py-3 sm:px-5 sm:py-4 flex justify-between items-center bg-gray-50 hover:bg-gray-100 transition rounded-t-lg focus:outline-none">
                                <div class="flex items-center gap-2 sm:gap-3 text-left">
                                    <span class="text-sm sm:text-base font-semibold text-gray-800">${chapter}</span>
                                    <span class="flex-shrink-0 text-[10px] sm:text-xs font-medium px-2 py-0.5 sm:py-1 bg-brand-100 text-brand-700 rounded-full" id="badge-${chapterId}">${stats.completed}/${stats.total}</span>
                                </div>
                                <svg class="w-4 h-4 sm:w-5 sm:h-5 flex-shrink-0 text-gray-500 transform transition-transform duration-200 ml-2" id="icon-${chapterId}" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                            </button>
                            <div id="${chapterId}" class="hidden px-3 py-3 sm:px-5 sm:py-4 border-t border-gray-100">
                                <div class="space-y-1.5 sm:space-y-2">
                    `;

                    topics.forEach((topic, index) => {
                        const isDone = isTopicCompleted(paper, chapter, topic);
                        const topicId = `${paper}-${chapter}-${index}`;
                        
                        paperHTML += `
                            <label class="flex items-start gap-2.5 sm:gap-3 p-2 hover:bg-gray-50 rounded cursor-pointer transition">
                                <div class="relative flex items-center h-4 sm:h-5 mt-0.5 sm:mt-0">
                                    <input type="checkbox" 
                                        class="w-4 h-4 sm:w-5 sm:h-5 text-brand-600 border-gray-300 rounded focus:ring-brand-500 cursor-pointer" 
                                        ${isDone ? 'checked' : ''} 
                                        onchange="handleTopicChange('${paper}', '${chapter}', '${topic}', '${chapterId}')"
                                    >
                                </div>
                                <span class="text-xs sm:text-sm text-gray-700 leading-relaxed ${isDone ? 'line-through text-gray-400' : ''}" id="text-${topicId}">${topic}</span>
                            </label>
                        `;
                    });

                    paperHTML += `</div></div></div>`;
                }

                paperHTML += `</div></div>`;
                syllabusContainer.innerHTML += paperHTML;
            }
        }

        function handleTopicChange(paper, chapter, topic, accordionId) {
            toggleTopic(paper, chapter, topic);
            
            const stats = getChapterStats(paper, chapter);
            document.getElementById(`badge-${accordionId}`).innerText = `${stats.completed}/${stats.total}`;
            
            const checkbox = event.target;
            const span = checkbox.closest('label').querySelector('span');
            if (checkbox.checked) {
                span.classList.add('line-through', 'text-gray-400');
            } else {
                span.classList.remove('line-through', 'text-gray-400');
            }
        }

        function toggleAccordion(id) {
            const content = document.getElementById(id);
            const icon = document.getElementById(`icon-${id}`);
            
            if (content.classList.contains('hidden')) {
                content.classList.remove('hidden');
                icon.classList.add('rotate-180');
            } else {
                content.classList.add('hidden');
                icon.classList.remove('rotate-180');
            }
        }

        function switchTab(tab) {
            document.getElementById('view-dashboard').classList.add('hidden');
            document.getElementById('view-syllabus').classList.add('hidden');
            
            document.getElementById('tab-dashboard').classList.remove('tab-active');
            document.getElementById('tab-syllabus').classList.remove('tab-active');

            document.getElementById(`view-${tab}`).classList.remove('hidden');
            document.getElementById(`tab-${tab}`).classList.add('tab-active');
        }

        function exportData() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(progressState));
            const dlAnchorElem = document.createElement('a');
            dlAnchorElem.setAttribute("href", dataStr);
            dlAnchorElem.setAttribute("download", "physics_tracker_backup.json");
            document.body.appendChild(dlAnchorElem);
            dlAnchorElem.click();
            document.body.removeChild(dlAnchorElem);
        }

        function importData(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const importedState = JSON.parse(e.target.result);
                    progressState = importedState;
                    saveState();
                    renderSyllabus(); 
                    
                    const indicator = document.getElementById('save-indicator');
                    indicator.innerHTML = `<svg class="w-3 h-3 sm:w-4 sm:h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg> রিস্টোর সফল হয়েছে!`;
                    indicator.classList.add('text-green-600');
                    indicator.classList.remove('text-gray-500');
                    setTimeout(() => {
                        indicator.classList.remove('text-green-600');
                        indicator.classList.add('text-gray-500');
                        indicator.innerHTML = `<svg class="w-3 h-3 sm:w-4 sm:h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg> অটো-সেভ অন আছে`;
                    }, 3000);
                } catch(err) {
                    alert("সঠিক ব্যাকআপ ফাইল নির্বাচন করুন!");
                }
            };
            reader.readAsText(file);
            event.target.value = ''; 
        }

        window.onload = () => {
            updateOverallProgress();
            renderDashboard();
            renderSyllabus();
        };

    </script>
</body>
</html>
